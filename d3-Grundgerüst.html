<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>D3 Test</title>

    <!-- D3 laden -->
    <script src="https://d3js.org/d3.v7.min.js"></script>
</head>

<body>
<div id="chart1"></div>
<script>

s=[5,2,8,4]

// SVG erstellen
const svg = d3.select("#chart1")
    .append("svg")
    .attr("width", 600)
    .attr("height", 400)


svg.selectAll("rect")
    .data(s)
    .enter()
    .append("rect")
    .attr("x", 300)
    .attr("y", 200)
    .attr("width", 60)
    .attr("height", 1000)
    .attr("fill", "steelblue");

</script>

</body>
</html>
